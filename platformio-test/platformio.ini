; PlatformIO Project Configuration File
; default_envs: pio run은 ttgo-lora32-v21만 빌드. native는 pio test -e native 전용.
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = ttgo-lora32-v21, native

[env:ttgo-lora32-v21]
platform = espressif32
board = ttgo-lora32-v21
framework = arduino
monitor_speed = 115200
upload_speed  = 921600

board_build.filesystem = littlefs   ; mkspiffs 대신 littlefs 사용

lib_deps =
    sandeepmistry/LoRa@^0.8.0
    adafruit/Adafruit MPU6050@^2.2.6
test_ignore  = test_loraPubSub   ; mock 기반 테스트는 native 전용

[env:native]
platform = native
build_flags =
    -std=c++14
    -I test/test_loraPubSub/mocks
build_src_filter = -<*> +<native_stub.cpp>   ; pio run용 더미 진입점만 포함
test_build_src = no