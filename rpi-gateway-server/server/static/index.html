<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoRa 해양 구조 모니터링</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }

    #conn-badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    #conn-badge.connected { border-color: var(--green); color: var(--green); }
    #conn-badge.disconnected { border-color: var(--red); color: var(--red); }

    #alert-banner {
      display: none;
      background: var(--red);
      color: #fff;
      text-align: center;
      padding: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      animation: blink 1s step-start infinite;
    }
    #alert-banner.active { display: block; }
    @keyframes blink { 50% { opacity: 0.4; } }

    main {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    /* Buoy cards */
    #buoy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .buoy-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .buoy-card.ALERT {
      border-color: var(--red);
      box-shadow: 0 0 18px rgba(248, 81, 73, 0.35);
    }
    .buoy-card.NORMAL { border-color: var(--green); }

    .buoy-card .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .buoy-card .card-title { font-size: 1rem; font-weight: 600; }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.ALERT { background: var(--red); animation: pulse 0.8s ease-in-out infinite; }
    .status-dot.NORMAL { background: var(--green); }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.7; }
    }

    .buoy-card .stat { font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; }
    .buoy-card .stat span { color: var(--text); }
    .status-label {
      display: inline-block;
      margin-top: 10px;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      background: var(--bg);
    }
    .status-label.ALERT { color: var(--red); border: 1px solid var(--red); }
    .status-label.NORMAL { color: var(--green); border: 1px solid var(--green); }

    /* Event log */
    #log-section h2 { font-size: 0.9rem; font-weight: 600; color: var(--muted); margin-bottom: 10px; }

    #event-log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      height: 220px;
      overflow-y: auto;
      font-size: 0.78rem;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    .log-entry { padding: 3px 0; border-bottom: 1px solid var(--border); }
    .log-entry:last-child { border-bottom: none; }
    .log-entry .ts { color: var(--muted); margin-right: 8px; }
    .log-entry.ALERT .tag { color: var(--red); }
    .log-entry.NORMAL .tag { color: var(--green); }
    .log-entry.INFO .tag { color: var(--blue); }

    footer {
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

<div id="alert-banner">⚠ 익수자 감지 경보 발생</div>

<header>
  <h1>🌊 LoRa 해양 구조 모니터링</h1>
  <span id="conn-badge" class="disconnected">● 연결 끊김</span>
</header>

<main>
  <div id="buoy-grid">
    <!-- Buoy cards injected by JS -->
  </div>

  <div id="log-section">
    <h2>이벤트 로그</h2>
    <div id="event-log"></div>
  </div>
</main>

<footer>LoRa PubSub Rescue System — Raspberry Pi Gateway</footer>

<script>
  const WS_URL = `ws://${location.host}/ws`;
  const MAX_LOG = 100;

  const grid = document.getElementById('buoy-grid');
  const log = document.getElementById('event-log');
  const badge = document.getElementById('conn-badge');
  const banner = document.getElementById('alert-banner');

  let buoys = {};   // node_id → state

  // ---- WebSocket ----
  function connect() {
    const ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      badge.textContent = '● 연결됨';
      badge.className = 'connected';
      addLog('INFO', 'WebSocket 연결 성공');
    };

    ws.onclose = () => {
      badge.textContent = '● 연결 끊김';
      badge.className = 'disconnected';
      addLog('INFO', '연결 끊김 — 5초 후 재시도');
      setTimeout(connect, 5000);
    };

    ws.onerror = () => {
      badge.textContent = '● 오류';
      badge.className = 'disconnected';
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'init') {
        msg.buoys.forEach(b => { buoys[b.node_id] = b; });
        renderAll();
      } else if (msg.type === 'packet') {
        const b = msg.buoy;
        buoys[b.node_id] = b;
        renderCard(b);
        addLog(b.status, `부표 ${b.node_id} — ${b.msg_type} topic=0x${b.topic.toString(16).padStart(2,'0')} rssi=${b.rssi ?? 'N/A'}`);
        updateBanner();
      }
    };
  }

  // ---- Render ----
  function renderAll() {
    grid.innerHTML = '';
    Object.values(buoys).forEach(renderCard);
    updateBanner();
  }

  function renderCard(b) {
    const id = `buoy-${b.node_id}`;
    let card = document.getElementById(id);
    if (!card) {
      card = document.createElement('div');
      card.id = id;
      card.className = 'buoy-card';
      grid.appendChild(card);
    }
    card.className = `buoy-card ${b.status}`;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-title">부표 ${b.node_id}</span>
        <span class="status-dot ${b.status}"></span>
      </div>
      <div class="stat">마지막 수신 <span>${b.last_seen}</span></div>
      <div class="stat">RSSI <span>${b.rssi != null ? b.rssi + ' dBm' : '—'}</span></div>
      <div class="stat">SNR <span>${b.snr != null ? b.snr + ' dB' : '—'}</span></div>
      <div class="stat">토픽 <span>0x${b.topic.toString(16).padStart(2,'0')}</span></div>
      <div class="stat">TTL <span>${b.ttl}</span></div>
      <span class="status-label ${b.status}">${b.status === 'ALERT' ? '⚠ 경보' : '● 정상'}</span>
    `;
  }

  function updateBanner() {
    const anyAlert = Object.values(buoys).some(b => b.status === 'ALERT');
    banner.className = anyAlert ? 'active' : '';
  }

  // ---- Log ----
  function addLog(level, text) {
    const now = new Date().toLocaleTimeString('ko-KR');
    const entry = document.createElement('div');
    entry.className = `log-entry ${level}`;
    entry.innerHTML = `<span class="ts">${now}</span><span class="tag">[${level}]</span> ${text}`;
    log.prepend(entry);
    // Trim old entries
    while (log.children.length > MAX_LOG) log.removeChild(log.lastChild);
  }

  connect();
</script>
</body>
</html>
